// Exercício: Soma de dois números
<script>
    let n1 = Number(prompt('Digite um número:'))
    let n2 = Number(prompt('Digite outro número:'))

    let soma = n1 + n2
    alert('A soma de ' + n1 + ' + ' + n2 + ' é: ' + soma)
</script>
