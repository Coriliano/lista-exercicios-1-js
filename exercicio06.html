// Exercício: Calculadora de média
<script>
    let no1 = Number(prompt('Digite sua nota:'))
    let no2 = Number(prompt('Digite sua outra nota:'))

    let media = (no1 + no2) / 2

    alert('A média das suas notas é ' + media)
</script>
