<body>

// Exercício: Desafio - compra simples
<script>
    let produto = prompt('O que você comprou?')
    let preco = Number(prompt('Quanto custou?'))
    let quant = Number(prompt('Quantos você comprou?'))

    let total = preco * quant

    alert('Você comprou ' + quant + ' ' + produto + ' por R$' + preco + ', o valor total da compra é de R$' + total)
</script>

</body>
